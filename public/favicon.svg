<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <clipPath id="s1"><rect x="0" y="10" width="32" height="4"/></clipPath>
    <clipPath id="s2"><rect x="0" y="20" width="32" height="3"/></clipPath>
  </defs>
  <!-- Background -->
  <rect width="32" height="32" rx="4" fill="#080010"/>
  <!-- Red corruption glow -->
  <path d="M23 7A11 11 0 1 0 23 25" fill="none" stroke="#ff0033" stroke-width="9" stroke-linecap="round" opacity="0.18"/>
  <!-- Red chromatic aberration layer -->
  <path d="M23 7A11 11 0 1 0 23 25" fill="none" stroke="#dd1133" stroke-width="5.5" stroke-linecap="round" opacity="0.55" transform="translate(2,0)"/>
  <!-- Main C -->
  <path d="M23 7A11 11 0 1 0 23 25" fill="none" stroke="#f0f0f0" stroke-width="5" stroke-linecap="round"/>
  <!-- Glitch slice 1: erase band, redraw red segment displaced right -->
  <rect x="0" y="10" width="32" height="4" fill="#080010"/>
  <path d="M23 7A11 11 0 1 0 23 25" fill="none" stroke="#ff3355" stroke-width="5" stroke-linecap="round" clip-path="url(#s1)" transform="translate(4,0)"/>
  <!-- Glitch slice 2: erase band, redraw segment displaced left -->
  <rect x="0" y="20" width="32" height="3" fill="#080010"/>
  <path d="M23 7A11 11 0 1 0 23 25" fill="none" stroke="#eeeeee" stroke-width="5" stroke-linecap="round" clip-path="url(#s2)" transform="translate(-3,0)"/>
</svg>
